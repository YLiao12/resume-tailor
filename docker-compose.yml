version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:16-alpine
    container_name: rt-db
    environment:
      POSTGRES_USER: ${DB_USER:-resume}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-resume123}
      POSTGRES_DB: ${DB_NAME:-resume_tailor}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-resume} -d ${DB_NAME:-resume_tailor}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rt-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-resume}:${DB_PASSWORD:-resume123}@db:5432/${DB_NAME:-resume_tailor}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React 前端 (开发模式)
  frontend:
    image: node:20-alpine
    container_name: rt-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1

  # Nginx (生产模式，开发时注释掉)
  # nginx:
  #   image: nginx:alpine
  #   container_name: rt-nginx
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
  #   depends_on:
  #     - backend
  #     - frontend

volumes:
  postgres_data:
