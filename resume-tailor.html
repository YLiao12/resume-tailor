<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Tailor — AI-Powered Resume & Cover Letter Generator</title>
    <!-- CDN Links -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.68/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.68/vfs_fonts.js"></script>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --text-primary: #f0f6fc;
            --text-secondary: #c9d1d9;
            --accent: #00b4d8;
            --accent-hover: #0096aa;
            --border: #30363d;
            --error: #f85149;
            --success: #56d364;
            --warning: #d29922;
            --info: #79c0ff;
            --badge-required: #00b4d8;
            --badge-preferred: #d29922;
            --badge-responsibility: #a371f7;
            --badge-tone: #8b949e;
            --font-title: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        .light-theme {
            --bg-primary: #ffffff;
            --bg-secondary: #f6f8fa;
            --text-primary: #24292f;
            --text-secondary: #656d76;
            --border: #d0d7de;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-title);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            background-color: var(--accent);
            color: var(--bg-primary);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 1.25rem;
        }

        .main {
            display: grid;
            grid-template-columns: 40% 30% 30%;
            height: 100vh;
            padding-top: 60px; /* nav height */
        }

        @media (max-width: 768px) {
            .main {
                display: flex;
                flex-direction: column;
                height: auto;
                padding-top: 60px;
            }

            .tab-nav {
                display: flex;
                background-color: var(--bg-secondary);
                border-bottom: 1px solid var(--border);
            }

            .tab-nav button {
                flex: 1;
                padding: 1rem;
                background: none;
                border: none;
                color: var(--text-secondary);
                cursor: pointer;
                font-weight: 500;
            }

            .tab-nav button.active {
                color: var(--accent);
                border-bottom: 2px solid var(--accent);
            }

            .tab-content {
                display: none;
            }

            .tab-content.active {
                display: block;
            }
        }

        .panel {
            padding: 1rem;
            overflow-y: auto;
            height: calc(100vh - 60px);
        }

        .panel h2 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .textarea {
            width: 100%;
            height: 80%;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            color: var(--text-primary);
            padding: 0.5rem;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            resize: vertical;
        }

        .preview {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            padding: 0.5rem;
            height: 80%;
            overflow-y: auto;
            font-family: var(--font-mono);
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            margin: 0.125rem;
            cursor: pointer;
        }

        .badge.required { background-color: var(--badge-required); }
        .badge.preferred { background-color: var(--badge-preferred); }
        .badge.responsibility { background-color: var(--badge-responsibility); }
        .badge.tone { background-color: var(--badge-tone); }
        .badge.selected { opacity: 1; }
        .badge.unselected { opacity: 0.5; }

        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .step {
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            background-color: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-weight: 600;
            margin: 0 0.5rem;
        }

        .step.active {
            background-color: var(--accent);
            color: var(--bg-primary);
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 1rem;
            height: 1rem;
            border: 2px solid var(--border);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: var(--error);
            background-color: rgba(248, 81, 73, 0.1);
            padding: 0.5rem;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .modal-content {
            background-color: var(--bg-secondary);
            padding: 2rem;
            border-radius: 0.5rem;
            width: 90%;
            max-width: 400px;
        }

        .modal h3 {
            margin-bottom: 1rem;
        }

        .modal input {
            width: 100%;
            padding: 0.5rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        .modal select {
            width: 100%;
            padding: 0.5rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        .hidden {
            display: none;
        }

        /* Mobile tabs */
        @media (min-width: 769px) {
            .tab-nav, .tab-content { display: none; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="logo">Resume Tailor</div>
        <div class="nav-actions">
            <button class="btn" id="api-settings-btn">Set API Key</button>
            <button class="theme-toggle" id="theme-toggle"><i data-lucide="sun"></i></button>
        </div>
    </nav>

    <div class="main" id="main">
        <!-- Left Panel: Markdown Editor -->
        <div class="panel">
            <h2>Step 1: Base Resume (Markdown)</h2>
            <button class="btn" id="load-template-btn">Load Template</button>
            <textarea class="textarea" id="resume-input" placeholder="Enter your base resume in Markdown format..."></textarea>
            <button class="btn" id="preview-toggle">Toggle Preview</button>
            <div class="preview hidden" id="preview"></div>
        </div>

        <!-- Middle Panel: JD Input -->
        <div class="panel">
            <h2>Step 2: Job Description</h2>
            <textarea class="textarea" id="jd-input" placeholder="Paste the job description here..."></textarea>
            <button class="btn" id="analyze-jd-btn">Analyze JD</button>
            <div id="keywords-section" class="hidden">
                <h3>Extracted Keywords</h3>
                <div id="keywords-container"></div>
            </div>
        </div>

        <!-- Right Panel: Results -->
        <div class="panel">
            <h2>Step 3: Generated Resume & Cover Letter</h2>
            <button class="btn" id="generate-resume-btn" disabled>Generate Tailored Resume</button>
            <div id="resume-preview" class="preview hidden"></div>
            <button class="btn" id="download-pdf-btn" disabled>Download PDF Resume</button>
            <button class="btn" id="generate-cover-btn" disabled>Generate Cover Letter</button>
            <div id="cover-letter-preview" class="preview hidden"></div>
            <button class="btn" id="download-cover-btn" disabled>Download Cover Letter</button>
        </div>
    </div>

    <!-- Mobile Tabs -->
    <div class="tab-nav hidden" id="tab-nav">
        <button class="tab-btn active" data-tab="resume">Resume</button>
        <button class="tab-btn" data-tab="jd">JD</button>
        <button class="tab-btn" data-tab="results">Results</button>
    </div>

    <div class="tab-content active" id="tab-resume">
        <!-- Same as left panel -->
    </div>
    <div class="tab-content" id="tab-jd">
        <!-- Same as middle panel -->
    </div>
    <div class="tab-content" id="tab-results">
        <!-- Same as right panel -->
    </div>

    <!-- API Settings Modal -->
    <div class="modal hidden" id="api-modal">
        <div class="modal-content">
            <h3>API Settings</h3>
            <label for="api-key">OpenRouter API Key (required):</label>
            <input type="text" id="api-key" placeholder="Enter your OpenRouter API Key">
            <p style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 1rem;">
                1. Go to <a href="https://openrouter.ai" target="_blank" style="color: var(--accent);">openrouter.ai</a> and create a free account<br>
                2. Get your API key from the dashboard<br>
                3. Free models available with rate limits
            </p>
            <div class="modal-actions">
                <button class="btn" id="save-api-btn">Save</button>
                <button class="btn" id="cancel-api-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Theme toggle
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        let isDark = true;

        themeToggle.addEventListener('click', () => {
            isDark = !isDark;
            body.classList.toggle('light-theme', !isDark);
            themeToggle.innerHTML = isDark ? '<i data-lucide="sun"></i>' : '<i data-lucide="moon"></i>';
            lucide.createIcons();
        });

        // Load template
        const loadTemplateBtn = document.getElementById('load-template-btn');
        const resumeInput = document.getElementById('resume-input');

        loadTemplateBtn.addEventListener('click', () => {
            resumeInput.value = `# Your Name
**email@example.com** | **123-456-7890** | **LinkedIn** | **GitHub**

## Work Experience
### Software Engineer | Company Name | Jan 2020 - Present
- Developed web applications using React and Node.js
- Collaborated with cross-functional teams to deliver projects on time

## Skills
- Programming Languages: JavaScript, Python
- Frameworks/Tools: React, Node.js, Docker

## Projects
### Project Name
- Description of the project and your role

## Education
### Bachelor's Degree | University Name | 2018
`;
        });

        // Preview toggle
        const previewToggle = document.getElementById('preview-toggle');
        const previewDiv = document.getElementById('preview');

        previewToggle.addEventListener('click', () => {
            previewDiv.classList.toggle('hidden');
            if (!previewDiv.classList.contains('hidden')) {
                previewDiv.innerHTML = marked.parse(resumeInput.value);
            }
        });

        // API Settings Modal
        const apiSettingsBtn = document.getElementById('api-settings-btn');
        const apiModal = document.getElementById('api-modal');
        const saveApiBtn = document.getElementById('save-api-btn');
        const cancelApiBtn = document.getElementById('cancel-api-btn');

        apiSettingsBtn.addEventListener('click', () => {
            apiModal.classList.remove('hidden');
        });

        cancelApiBtn.addEventListener('click', () => {
            apiModal.classList.add('hidden');
        });

        saveApiBtn.addEventListener('click', () => {
            const apiKey = document.getElementById('api-key').value;
            localStorage.setItem('kiloApiKey', apiKey);
            apiModal.classList.add('hidden');
            showToast('API settings saved');
        });

        // Load from localStorage
        window.addEventListener('load', () => {
            resumeInput.value = localStorage.getItem('resume') || '';
            document.getElementById('api-key').value = localStorage.getItem('kiloApiKey') || '';
        });

        // Save resume on change
        resumeInput.addEventListener('input', () => {
            localStorage.setItem('resume', resumeInput.value);
        });

        // Mobile tabs
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
            });
        });

        // Initialize Lucide icons
        lucide.createIcons();

        // Global state
        let extractedKeywords = null;
        let selectedKeywords = {
            required_skills: [],
            preferred_skills: [],
            responsibility_keywords: [],
            tone_keywords: []
        };

        // Analyze JD
        const analyzeJdBtn = document.getElementById('analyze-jd-btn');
        const jdInput = document.getElementById('jd-input');
        const keywordsSection = document.getElementById('keywords-section');
        const keywordsContainer = document.getElementById('keywords-container');
        const generateResumeBtn = document.getElementById('generate-resume-btn');

        analyzeJdBtn.addEventListener('click', async () => {
            const jdContent = jdInput.value.trim();
            if (!jdContent) {
                showToast('Please paste a job description first');
                return;
            }

            const apiKey = localStorage.getItem('kiloApiKey');
            if (!apiKey) {
                showToast('Please set your OpenRouter API key first');
                apiModal.classList.remove('hidden');
                return;
            }

            analyzeJdBtn.disabled = true;
            analyzeJdBtn.innerHTML = '<span class="spinner" style="display:inline-block;width:12px;height:12px;"></span> Analyzing...';

            try {
                const result = await analyzeJD(jdContent, apiKey);
                extractedKeywords = result;
                displayKeywords(result);
                keywordsSection.classList.remove('hidden');
                generateResumeBtn.disabled = false;
                showToast('JD analyzed successfully!');
            } catch (error) {
                showToast('Error: ' + error.message);
            } finally {
                analyzeJdBtn.disabled = false;
                analyzeJdBtn.innerHTML = 'Analyze JD';
            }
        });

        // OpenRouter API - Free models with CORS support
        const OPENROUTER_API_BASE = 'https://openrouter.ai/api/v1';
        const FREE_MODEL = 'nvidia/nemotron-3-super-120b-a12b:free';

        async function analyzeJD(jdContent, apiKey) {
            const prompt = `You are a professional recruiter. Analyze the following job description and extract key information. Return ONLY valid JSON, no extra text.

JD:
${jdContent}

Return this exact JSON structure:
{
  "job_title": "position title",
  "company_name": "company name or empty string",
  "required_skills": ["skill1", "skill2"],
  "preferred_skills": ["skill1", "skill2"],
  "responsibility_keywords": ["verb phrase1", "verb phrase2"],
  "tone_keywords": ["keyword1", "keyword2"],
  "key_requirements": ["requirement1", "requirement2"]
}`;

            const headers = {
                'Content-Type': 'application/json',
                'HTTP-Referer': window.location.href,
                'X-Title': 'Resume Tailor'
            };

            // Add auth header if API key provided (optional for free models)
            if (apiKey) {
                headers['Authorization'] = `Bearer ${apiKey}`;
            }

            const response = await fetch(`${OPENROUTER_API_BASE}/chat/completions`, {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({
                    model: FREE_MODEL,
                    messages: [{ role: 'user', content: prompt }],
                    temperature: 0.3
                })
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error?.message || `API request failed: ${response.status}`);
            }

            const data = await response.json();
            const content = data.choices[0].message.content;
            return JSON.parse(content.replace(/```json\n?|```\n?/g, '').trim());
        }

        function displayKeywords(keywords) {
            keywordsContainer.innerHTML = '';

            const categories = [
                { key: 'required_skills', label: 'Required Skills', class: 'required' },
                { key: 'preferred_skills', label: 'Preferred Skills', class: 'preferred' },
                { key: 'responsibility_keywords', label: 'Responsibilities', class: 'responsibility' },
                { key: 'tone_keywords', label: 'Tone/Style', class: 'tone' }
            ];

            categories.forEach(cat => {
                const items = keywords[cat.key];
                if (!items || items.length === 0) return;

                const section = document.createElement('div');
                section.style.marginBottom = '1rem';

                const label = document.createElement('div');
                label.textContent = cat.label;
                label.style.fontSize = '0.875rem';
                label.style.fontWeight = '600';
                label.style.marginBottom = '0.5rem';
                label.style.color = 'var(--text-primary)';
                section.appendChild(label);

                items.forEach(item => {
                    const badge = document.createElement('span');
                    badge.className = `badge ${cat.class} selected`;
                    badge.textContent = item;
                    badge.dataset.category = cat.key;
                    badge.dataset.value = item;

                    badge.addEventListener('click', () => {
                        badge.classList.toggle('selected');
                        badge.classList.toggle('unselected');
                        updateSelectedKeywords();
                    });

                    section.appendChild(badge);
                });

                keywordsContainer.appendChild(section);
            });

            // Store job info for later use
            if (keywords.job_title) {
                localStorage.setItem('jobTitle', keywords.job_title);
            }
            if (keywords.company_name) {
                localStorage.setItem('companyName', keywords.company_name);
            }

            updateSelectedKeywords();
        }

        function updateSelectedKeywords() {
            selectedKeywords = {
                required_skills: [],
                preferred_skills: [],
                responsibility_keywords: [],
                tone_keywords: []
            };

            document.querySelectorAll('.badge.selected').forEach(badge => {
                const category = badge.dataset.category;
                const value = badge.dataset.value;
                if (selectedKeywords[category]) {
                    selectedKeywords[category].push(value);
                }
            });
        }

        // Global state for generated resume
        let generatedResume = null;
        let generatedCoverLetter = '';

        // Generate Tailored Resume
        const resumePreview = document.getElementById('resume-preview');

        generateResumeBtn.addEventListener('click', async () => {
            const baseResume = resumeInput.value.trim();
            if (!baseResume) {
                showToast('Please enter your base resume first');
                return;
            }

            if (!extractedKeywords) {
                showToast('Please analyze JD first');
                return;
            }

            const apiKey = localStorage.getItem('kiloApiKey');
            if (!apiKey) {
                showToast('Please set your API key first');
                apiModal.classList.remove('hidden');
                return;
            }

            generateResumeBtn.disabled = true;
            generateResumeBtn.innerHTML = '<span class="spinner" style="display:inline-block;width:12px;height:12px;"></span> Generating...';

            try {
                const result = await generateTailoredResume(baseResume, selectedKeywords, apiKey);
                generatedResume = result;

                // Add job info for filename
                generatedResume.header.jobTitle = extractedKeywords.job_title || 'Position';
                generatedResume.header.company = extractedKeywords.company_name || 'Company';

                // Display preview
                resumePreview.innerHTML = renderResumePreview(generatedResume);
                resumePreview.classList.remove('hidden');

                // Enable download buttons
                downloadPdfBtn.disabled = false;
                document.getElementById('generate-cover-btn').disabled = false;

                showToast('Resume generated successfully!');
            } catch (error) {
                showToast('Error: ' + error.message);
            } finally {
                generateResumeBtn.disabled = false;
                generateResumeBtn.innerHTML = 'Generate Tailored Resume';
            }
        });

        async function generateTailoredResume(baseResume, keywords, apiKey) {
            // Build keywords string
            const allKeywords = [];
            if (keywords.required_skills?.length) allKeywords.push(`Required Skills: ${keywords.required_skills.join(', ')}`);
            if (keywords.preferred_skills?.length) allKeywords.push(`Preferred Skills: ${keywords.preferred_skills.join(', ')}`);
            if (keywords.responsibility_keywords?.length) allKeywords.push(`Key Responsibilities: ${keywords.responsibility_keywords.join(', ')}`);
            if (keywords.tone_keywords?.length) allKeywords.push(`Tone/Style: ${keywords.tone_keywords.join(', ')}`);

            const prompt = `You are an expert resume writer. Given the user's base resume and JD keywords, generate an optimized resume tailored to the target job.

STRICT RULES:
1. Never invent experience, skills, or achievements the user does not have
2. Only rephrase and enhance existing content
3. CRITICAL: Naturally weave the JD keywords into bullet points — each bullet should include 1-2 relevant keywords where applicable
4. Start each bullet point with a strong action verb (Designed, Built, Optimized, Deployed, Led, Implemented, etc.)
5. Use STAR format (Situation-Task-Action-Result) where possible
6. Keep total word count to 500-600 words (one A4 page)
7. Return ONLY valid JSON, no extra text

BASE RESUME (Markdown):
${baseResume}

JD KEYWORDS TO WEAVE THROUGHOUT (use these naturally in your writing):
${allKeywords.join('\n')}

INSTRUCTIONS FOR KEYWORD INTEGRATION:
- Review each bullet point in the base resume
- Identify which JD keywords are relevant to that experience
- Rewrite the bullet to naturally include those keywords
- Example: If JD mentions "REST API" and user built APIs, change "Built APIs" to "Designed and implemented REST APIs"
- Prioritize Required Skills, then Preferred Skills, then Responsibility keywords
- Ensure skills section includes all relevant Required Skills from JD

Return this JSON structure:
{
  "header": { "name": "", "email": "", "phone": "", "linkedin": "", "github": "" },
  "summary": "2-3 sentence professional summary incorporating keywords",
  "experience": [
    {
      "title": "",
      "company": "",
      "location": "",
      "dates": "",
      "bullets": ["Bullet point with keywords", "..."]
    }
  ],
  "skills": {
    "languages": [],
    "frameworks": [],
    "tools": []
  },
  "projects": [
    { "name": "", "tech_stack": "", "description": "" }
  ],
  "education": [
    { "degree": "", "school": "", "year": "" }
  ]
}`;

            const response = await fetch(`${OPENROUTER_API_BASE}/chat/completions`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`,
                    'HTTP-Referer': window.location.href,
                    'X-Title': 'Resume Tailor'
                },
                body: JSON.stringify({
                    model: FREE_MODEL,
                    messages: [{ role: 'user', content: prompt }],
                    temperature: 0.5
                })
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error?.message || `API request failed: ${response.status}`);
            }

            const data = await response.json();
            const content = data.choices[0].message.content;
            return JSON.parse(content.replace(/```json\n?|```\n?/g, '').trim());
        }

        function renderResumePreview(resume) {
            let html = '<div style="font-family: Helvetica, sans-serif; padding: 20px;">';

            // Header
            html += `<h1 style="color: #1a1a2e; margin-bottom: 5px;">${resume.header.name}</h1>`;
            html += `<p style="color: #555; font-size: 12px; margin-bottom: 15px;">`;
            const contacts = [];
            if (resume.header.email) contacts.push(resume.header.email);
            if (resume.header.phone) contacts.push(resume.header.phone);
            if (resume.header.linkedin) contacts.push('LinkedIn');
            if (resume.header.github) contacts.push('GitHub');
            html += contacts.join(' | ');
            html += '</p>';

            // Summary
            if (resume.summary) {
                html += '<h3 style="color: #1a1a2e; border-bottom: 1px solid #1a1a2e; padding-bottom: 3px;">Professional Summary</h3>';
                html += `<p style="font-size: 11px; margin: 10px 0;">${resume.summary}</p>`;
            }

            // Experience
            if (resume.experience && resume.experience.length > 0) {
                html += '<h3 style="color: #1a1a2e; border-bottom: 1px solid #1a1a2e; padding-bottom: 3px;">Work Experience</h3>';
                resume.experience.forEach(exp => {
                    html += `<p style="font-weight: bold; margin: 8px 0 2px 0;">${exp.title} | ${exp.company}${exp.location ? ' | ' + exp.location : ''}</p>`;
                    html += `<p style="color: #666; font-size: 10px; margin: 0 0 5px 0;">${exp.dates}</p>`;
                    if (exp.bullets) {
                        html += '<ul style="margin: 5px 0; padding-left: 20px;">';
                        exp.bullets.forEach(bullet => {
                            html += `<li style="font-size: 10px; margin: 2px 0;">${bullet}</li>`;
                        });
                        html += '</ul>';
                    }
                });
            }

            // Skills
            if (resume.skills) {
                html += '<h3 style="color: #1a1a2e; border-bottom: 1px solid #1a1a2e; padding-bottom: 3px;">Skills</h3>';
                if (resume.skills.languages && resume.skills.languages.length > 0) {
                    html += `<p style="font-size: 10px; margin: 3px 0;"><strong>Languages:</strong> ${resume.skills.languages.join(', ')}</p>`;
                }
                if (resume.skills.frameworks && resume.skills.frameworks.length > 0) {
                    html += `<p style="font-size: 10px; margin: 3px 0;"><strong>Frameworks:</strong> ${resume.skills.frameworks.join(', ')}</p>`;
                }
                if (resume.skills.tools && resume.skills.tools.length > 0) {
                    html += `<p style="font-size: 10px; margin: 3px 0;"><strong>Tools:</strong> ${resume.skills.tools.join(', ')}</p>`;
                }
            }

            // Projects
            if (resume.projects && resume.projects.length > 0) {
                html += '<h3 style="color: #1a1a2e; border-bottom: 1px solid #1a1a2e; padding-bottom: 3px;">Projects</h3>';
                resume.projects.forEach(proj => {
                    html += `<p style="font-weight: bold; margin: 5px 0;">${proj.name}${proj.tech_stack ? ' | ' + proj.tech_stack : ''}</p>`;
                    html += `<p style="font-size: 10px; margin: 2px 0;">${proj.description}</p>`;
                });
            }

            // Education
            if (resume.education && resume.education.length > 0) {
                html += '<h3 style="color: #1a1a2e; border-bottom: 1px solid #1a1a2e; padding-bottom: 3px;">Education</h3>';
                resume.education.forEach(edu => {
                    html += `<p style="font-size: 10px; margin: 3px 0;">${edu.degree} | ${edu.school} | ${edu.year}</p>`;
                });
            }

            html += '</div>';
            return html;
        }

        // Download PDF Resume
        const downloadPdfBtn = document.getElementById('download-pdf-btn');

        downloadPdfBtn.addEventListener('click', () => {
            if (!generatedResume) {
                showToast('Please generate resume first');
                return;
            }
            generatePDF(generatedResume);
        });

        // Download Cover Letter
        const downloadCoverBtn = document.getElementById('download-cover-btn');

        downloadCoverBtn.addEventListener('click', () => {
            if (!generatedCoverLetter) {
                showToast('Please generate cover letter first');
                return;
            }
            const blob = new Blob([generatedCoverLetter], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const jobTitle = generatedResume?.header?.jobTitle || 'Position';
            const company = generatedResume?.header?.company || 'Company';
            a.download = `CoverLetter_${jobTitle}_${company}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        });

        // PDF Generation using pdfmake
        function generatePDF(resume) {
            const docDefinition = {
                pageSize: 'A4',
                pageMargins: [40, 40, 40, 40],
                content: [],
                styles: {
                    header: {
                        fontSize: 24,
                        bold: true,
                        color: '#1a1a2e',
                        margin: [0, 0, 0, 5]
                    },
                    contact: {
                        fontSize: 10,
                        color: '#555',
                        margin: [0, 0, 0, 15]
                    },
                    sectionHeader: {
                        fontSize: 12,
                        bold: true,
                        color: '#1a1a2e',
                        margin: [0, 15, 0, 5],
                        decoration: 'underline'
                    },
                    jobTitle: {
                        fontSize: 11,
                        bold: true,
                        margin: [0, 8, 0, 2]
                    },
                    jobMeta: {
                        fontSize: 9,
                        color: '#666',
                        margin: [0, 0, 0, 5]
                    },
                    bullet: {
                        fontSize: 9,
                        margin: [10, 2, 0, 2]
                    },
                    summary: {
                        fontSize: 9,
                        margin: [0, 5, 0, 5],
                        color: '#333'
                    },
                    skillCategory: {
                        fontSize: 9,
                        bold: true,
                        margin: [0, 3, 0, 2]
                    },
                    skillItem: {
                        fontSize: 9,
                        margin: [0, 1, 0, 1]
                    }
                },
                defaultStyle: {
                    font: 'Roboto'
                }
            };

            // Header
            docDefinition.content.push(
                { text: resume.header.name || 'Name', style: 'header' },
                { 
                    text: [
                        resume.header.email || '',
                        resume.header.phone ? ' | ' + resume.header.phone : '',
                        resume.header.linkedin ? ' | LinkedIn' : '',
                        resume.header.github ? ' | GitHub' : ''
                    ].join(''),
                    style: 'contact'
                }
            );

            // Summary
            if (resume.summary) {
                docDefinition.content.push(
                    { text: 'PROFESSIONAL SUMMARY', style: 'sectionHeader' },
                    { text: resume.summary, style: 'summary' }
                );
            }

            // Experience
            if (resume.experience && resume.experience.length > 0) {
                docDefinition.content.push({ text: 'WORK EXPERIENCE', style: 'sectionHeader' });
                resume.experience.forEach(exp => {
                    docDefinition.content.push({
                        text: `${exp.title} | ${exp.company}${exp.location ? ' | ' + exp.location : ''}`,
                        style: 'jobTitle'
                    });
                    docDefinition.content.push({ text: exp.dates, style: 'jobMeta' });
                    if (exp.bullets) {
                        exp.bullets.forEach(bullet => {
                            docDefinition.content.push({ text: '• ' + bullet, style: 'bullet' });
                        });
                    }
                });
            }

            // Skills
            if (resume.skills) {
                docDefinition.content.push({ text: 'SKILLS', style: 'sectionHeader' });
                const skillsContent = [];
                if (resume.skills.languages && resume.skills.languages.length > 0) {
                    skillsContent.push({ text: 'Languages: ' + resume.skills.languages.join(', '), style: 'skillItem' });
                }
                if (resume.skills.frameworks && resume.skills.frameworks.length > 0) {
                    skillsContent.push({ text: 'Frameworks: ' + resume.skills.frameworks.join(', '), style: 'skillItem' });
                }
                if (resume.skills.tools && resume.skills.tools.length > 0) {
                    skillsContent.push({ text: 'Tools: ' + resume.skills.tools.join(', '), style: 'skillItem' });
                }
                docDefinition.content.push(...skillsContent);
            }

            // Projects
            if (resume.projects && resume.projects.length > 0) {
                docDefinition.content.push({ text: 'PROJECTS', style: 'sectionHeader' });
                resume.projects.forEach(proj => {
                    docDefinition.content.push({
                        text: `${proj.name}${proj.tech_stack ? ' | ' + proj.tech_stack : ''}`,
                        style: 'jobTitle'
                    });
                    docDefinition.content.push({ text: proj.description, style: 'bullet' });
                });
            }

            // Education
            if (resume.education && resume.education.length > 0) {
                docDefinition.content.push({ text: 'EDUCATION', style: 'sectionHeader' });
                resume.education.forEach(edu => {
                    docDefinition.content.push({
                        text: `${edu.degree} | ${edu.school} | ${edu.year}`,
                        style: 'jobTitle'
                    });
                });
            }

            // Generate PDF
            const jobTitle = resume.header.jobTitle || 'Position';
            const company = resume.header.company || 'Company';
            pdfMake.createPdf(docDefinition).download(`Resume_${jobTitle}_${company}.pdf`);
        }

        // Toast notification
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: var(--bg-secondary);
                color: var(--text-primary);
                padding: 1rem;
                border-radius: 0.5rem;
                border: 1px solid var(--border);
                z-index: 300;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
